<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumely | AI Resume Optimizer</title>
    
    <meta name="description" content="Optimize your professional trajectory with Resumely.">
    <meta property="og:title" content="Resumely AI Resume Optimizer">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">   
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg sticky-top bg-white">
        <div class="container">
            <a class="navbar-brand" href="/">RESUMELY</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="#editor">EDITOR</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="hero-title">Tailor Your Resume for Every Job Using AI</h1>
            <p class="text-secondary mb-5 fs-5">A technical architect for your career trajectory.</p>
            <a href="#editor" class="btn btn-primary-onyx btn-lg">GET STARTED</a>
        </div>
    </header>

    <main class="container mb-5" id="editor">
        <div class="bento-card shadow-sm">
            <form action="/generate" method="POST" id="resumeForm">
                <div class="row g-4">
                    <div class="col-lg-6 input-pane pe-lg-5">
                        <h2 class="h4 mb-4">Core Attributes</h2>
                        <div class="mb-4">
                            <label class="label-technical">Technical Skills</label>
                            <textarea name="skills" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="label-technical">Key Projects</label>
                            <textarea name="projects" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="label-technical">Experience</label>
                            <textarea name="experience" class="form-control" rows="6" required></textarea>
                        </div>
                    </div>

                    <div class="col-lg-6 ps-lg-5">
                        <h2 class="h4 mb-4">Target Parameters</h2>
                        <div class="mb-4">
                            <label class="label-technical">Job Description</label>
                            <textarea name="job_description" class="form-control" style="height: 400px;" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary-onyx w-100 py-3">ANALYSE STRUCTURE</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('resumeForm').addEventListener('submit', function() {
            document.getElementById('loading-overlay').style.display = 'flex';
        });
    </script>

    {% if result %}
        <h3>Result</h3>
        <pre>{{ result }}</pre>
    {% endif %}
</body>
</html>
